name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: |
          if ! command -v jq >/dev/null; then
            if [ "${{ matrix.os }}" = "macos-latest" ]; then
              brew install jq
            else
              sudo apt-get update && sudo apt-get install -y jq
            fi
          fi
      - name: Run bash tests
        run: bash tests/run-all.sh
